name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Hangfire.RecurringJobs.slnx --configfile NuGet.Config

      - name: Build
        run: dotnet build Hangfire.RecurringJobs.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Hangfire.RecurringJobs.Tests/Hangfire.RecurringJobs.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"
