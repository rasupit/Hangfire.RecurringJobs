name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Hangfire.RecurringJobs.slnx

      - name: Build
        run: dotnet build Hangfire.RecurringJobs.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Hangfire.RecurringJobs.Tests/Hangfire.RecurringJobs.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Pack
        run: dotnet pack src/Hangfire.RecurringJobs/Hangfire.RecurringJobs.csproj --configuration Release --no-build --output ./artifacts/packages

      - name: Publish to NuGet.org
        run: dotnet nuget push "./artifacts/packages/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "${{ secrets.NUGET_API_KEY }}" --skip-duplicate
